repos:
-   repo: local
    hooks:
    -   id: cargo-fmt
        name: cargo fmt (check)
        entry: cargo fmt --all -- --check
        language: system
        files: '\.rs$'
    -   id: cargo-clippy
        name: cargo clippy (deny warnings)
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        files: '\.rs$'
